spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:mgps_master}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}

logging:
  level:
    root: INFO
    com.mgps: DEBUG
