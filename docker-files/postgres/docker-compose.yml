version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mgps-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mgps-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mgps-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: thinkvalleyacademy@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      # Enable server mode with auto-refresh
      SCRIPT_NAME: /pgadmin
      # Auto-discovery settings
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'False'
      # Provisioning mode for auto server registration
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: 10
      # Auto-register servers on startup
      PGADMIN_CONFIG_SERVER_INACTIVITY_TIMEOUT: 0
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./servers.json:/pgadmin4/servers.json
      - ./provisioning:/var/lib/pgadmin/storage/provisioning
    depends_on:
      - postgres
    networks:
      - mgps-network
    restart: unless-stopped
    user: root:root

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  mgps-network:
    driver: bridge
