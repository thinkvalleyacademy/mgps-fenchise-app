services:
  backend:
    build:
      context: ${CODE_DIR:-/home/mgps01/mgpsv2/code/mgpsfren/mgps-fenchise-app}
      dockerfile: mgpsfren-backend/Dockerfile
      network: host
    container_name: mgps-backend
    restart: unless-stopped
    networks:
      - mgps-shared
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-mgps_master}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres123}
      APP_JWT_SECRET_KEY: ${JWT_SECRET:-change-this-in-production}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
    ports:
      - "${BACKEND_PORT:-8081}:8080"

  frontend:
    build:
      context: ${CODE_DIR:-/home/mgps01/mgpsv2/code/mgpsfren/mgps-fenchise-app}
      dockerfile: mgpsfren-frontend/Dockerfile
      network: host
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: mgps-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - mgps-shared
    expose:
      - "80"

  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: mgps-proxy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    networks:
      - mgps-shared
    ports:
      - "${PROXY_PORT:-6080}:80"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  mgps-shared:
    name: mgps-shared
    external: true
