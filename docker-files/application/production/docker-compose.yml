services:
  postgres:
    image: postgres:16-alpine
    container_name: mgps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-mgps_master}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ../../..
      dockerfile: mgpsfren-backend/Dockerfile
    container_name: mgps-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-mgps_master}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres123}
      APP_JWT_SECRET_KEY: ${JWT_SECRET:-change-this-in-production}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ../../..
      dockerfile: mgpsfren-frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: mgps-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: mgps-proxy
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${PROXY_PORT:-80}:80"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
